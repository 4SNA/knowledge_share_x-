# Application
spring.application.name=KnowledgeGraphX
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/knowledgegraphx;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Upload Directory
app.upload.dir=./uploads

# Embedding Configuration
app.embedding.chunk-size=500
app.embedding.chunk-overlap=50
app.embedding.vocabulary-size=5000
